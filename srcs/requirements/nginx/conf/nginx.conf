#control the conexions
events {}

http {
    server {
        #port http
        listen 443 ssl;
        server_name natrodri.42.fr;

        #verify site is true
        ssl_certificate     /etc/ssl/certs/natrodri.crt;
        #key for decrypt
        ssl_certificate_key /etc/ssl/private/natrodri.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root /var/www/wordpress;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}